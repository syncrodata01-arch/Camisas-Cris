<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acervo de Camisas | Premium</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --verde: #006437;
    --verde-escuro: #004d2a;
    --ouro: #c5a847;
    --bg: #f0f2f5;
    --white: #fff;
    --shadow: rgba(0,0,0,0.1);
}

/* RESET */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    transition: .4s;
}

/* MODOS */
body.modo-palmeiras {
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/1/10/Palmeiras_logo.svg');
    background-repeat: no-repeat;
    background-position: center;
    background-size: 60%;
    background-blend-mode: overlay;
}

body.modo-outros {
    background: #e0f2fe;
}

/* HEADER */
header {
    background: linear-gradient(135deg, var(--verde-escuro), var(--verde));
    color: white;
    padding: 20px;
    text-align: center;
    border-bottom: 4px solid var(--ouro);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.nav-tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.tab-btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: rgba(255,255,255,0.2);
    color: white;
    transition: .3s;
}

.tab-btn.active {
    background: white;
    color: #333;
}

/* CONTAINER */
.container {
    max-width: 1300px;
    margin: auto;
    padding: 15px;
}

/* TOOLBAR */
.toolbar {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: -30px;
    box-shadow: 0 10px 30px var(--shadow);
}

/* BOTÕES */
.btn-action {
    padding: 10px 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    color: white;
    transition: .3s;
}

.btn-action:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 20px;
    margin-top: 25px;
}

/* CARD */
.card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 5px 15px var(--shadow);
    transition: .3s;
}

.card:hover {
    transform: translateY(-6px) scale(1.01);
}

.img-box {
    height: 210px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
}

.img-box img {
    max-width: 100%;
    max-height: 100%;
}

.card-info {
    padding: 12px;
    text-align: center;
}

.card-title {
    font-weight: 700;
    font-size: 0.95rem;
}

/* BADGE */
.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--ouro);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.7rem;
}

/* DELETE */
.btn-del {
    position: absolute;
    top: 10px;
    right: 10px;
    background: white;
    border: none;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    color: red;
    cursor: pointer;
}

/* RESPONSIVO */
@media(max-width:600px){
    .toolbar { flex-direction: column; }
}
</style>
</head>

<body class="modo-palmeiras">

<header>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="setModo('palmeiras')">Palmeiras</button>
        <button class="tab-btn" onclick="setModo('outros')">Outros</button>
    </div>

    <h1 id="titulo">Camisas Palmeiras Cris</h1>

    <div style="font-size:0.9rem">
        Total: <span id="totalQtd">0</span> |
        <span id="totalVal" onclick="togglePrivado()" style="cursor:pointer">R$ ******</span>
    </div>
</header>

<div class="container">

<div class="toolbar">
    <input id="busca" placeholder="Buscar..." style="padding:10px;border-radius:20px;border:1px solid #ddd">

    <label class="btn-action" style="background:var(--verde)">
        ➕ Add <input type="file" hidden multiple onchange="handleUpload(event)">
    </label>

    <button class="btn-action" style="background:#3498db" onclick="saveBackup()">💾 Backup</button>
    <button class="btn-action" style="background:#e67e22" onclick="exportarPDF()">📄 PDF</button>
</div>

<div id="grid" class="grid"></div>

</div>

<script>
let db, modo="palmeiras", ver=false;

/* ===== DEBOUNCE BUSCA ===== */
let debounce;
document.getElementById('busca').addEventListener('input',()=>{
    clearTimeout(debounce);
    debounce = setTimeout(render,300);
});

/* ===== DATABASE ===== */
const req = indexedDB.open("AcervoV6",1);

req.onupgradeneeded = e=>{
    const d=e.target.result;
    if(!d.objectStoreNames.contains("palmeiras"))
        d.createObjectStore("palmeiras",{keyPath:"id"});
    if(!d.objectStoreNames.contains("outros"))
        d.createObjectStore("outros",{keyPath:"id"});
};

req.onsuccess=e=>{
    db=e.target.result;
    render();
};

/* ===== MODO ===== */
function setModo(m){
    modo=m;
    document.body.className="modo-"+m;
    document.getElementById('titulo').innerText=
        m==="palmeiras"?"Camisas Palmeiras Cris":"Outros Times";
    render();
}

/* ===== RENDER ===== */
function render(){
    if(!db) return;

    const grid=document.getElementById('grid');
    grid.innerHTML="";

    const termo=document.getElementById('busca').value.toUpperCase();

    db.transaction(modo,"readonly").objectStore(modo).getAll().onsuccess=e=>{
        let totalQ=0,totalV=0;

        e.target.result.forEach(item=>{
            if(!item.nome.toUpperCase().includes(termo)) return;

            totalQ+=parseInt(item.qtd||1);
            totalV+=item.preco*item.qtd;

            const el=document.createElement('div');
            el.className="card";

            el.innerHTML=`
            <div class="badge">${item.qtd}x</div>
            <button class="btn-del" onclick="del('${item.id}')">✕</button>

            <div class="img-box">
                <img src="${item.img}">
            </div>

            <div class="card-info">
                <span class="card-title" contenteditable
                onblur="upd('${item.id}','nome',this.innerText)">
                ${item.nome}
                </span>
            </div>
            `;

            grid.appendChild(el);
        });

        document.getElementById('totalQtd').innerText=totalQ;
        document.getElementById('totalVal').innerText=
            ver?totalV.toLocaleString('pt-br',{style:'currency',currency:'BRL'}):"R$ ******";
    };
}

/* ===== FUNÇÕES ===== */
function handleUpload(e){
    Array.from(e.target.files).forEach(file=>{
        const reader=new FileReader();
        reader.onload=ev=>{
            const nova={
                id:Date.now()+Math.random(),
                nome:file.name,
                img:ev.target.result,
                qtd:1,
                preco:0
            };
            db.transaction(modo,"readwrite").objectStore(modo).put(nova).onsuccess=render;
        };
        reader.readAsDataURL(file);
    });
}

function upd(id,f,v){
    const os=db.transaction(modo,"readwrite").objectStore(modo);
    os.get(id).onsuccess=e=>{
        const d=e.target.result;
        d[f]=v;
        os.put(d);
    };
}

function del(id){
    if(confirm("Excluir?"))
        db.transaction(modo,"readwrite").objectStore(modo).delete(id).onsuccess=render;
}

function togglePrivado(){
    ver=!ver;
    render();
}

function saveBackup(){
    db.transaction(modo,"readonly").objectStore(modo).getAll().onsuccess=e=>{
        const blob=new Blob([JSON.stringify(e.target.result)],{type:'application/json'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download="backup.json";
        a.click();
    };
}

function exportarPDF(){
    html2pdf().from(document.body).save("acervo.pdf");
}
</script>

</body>
</html>
